<!--
  frontend/index.html
  ======================
  See README.md -> "Architecture" and original spec section "Main Page --
  Live Dashboard".

  WHAT THIS FILE OWNS
  --------------------
  The live dashboard: connects to ws://<host>/ws/live (api/websocket.py)
  and renders the status of every registered test as it updates, in real
  time, with no polling.

  WHAT TO IMPLEMENT
  --------------------
  1. On page load: GET /api/tests to render the initial list of tests --
     don't wait for the first websocket event, since there may be a
     short delay before any test completes its first iteration.
  2. Open `new WebSocket("ws://" + location.host + "/ws/live")`.
  3. On each message (JSON: {test_id, status, pps, loss_pct, timestamp}):
     find or create a row for test_id, update its status indicator
     (OK / FAIL / TIMEOUT -- see original spec's dashboard mockup for the
     glyphs used) and its pps/loss% text.
  4. Group rows by pair (internal/external) -- for MVP there is only one
     pair, so this can render as a single section, but read pair names
     from the /api/tests response rather than hardcoding "one pair ever";
     a second pair (test_isolation.py, deferred) will need this later.
  5. A visible top bar with total running test count and
     [Start All] / [Stop All] buttons wired to POST /api/tests/start-all
     and /api/tests/stop-all (api/routes_tests.py).
  6. Clicking a test row should navigate to
     test_detail.html?id=<test_id> (not required for the MVP dashboard
     to be useful, but leave the hook in place -- see frontend/test_detail.html).

  KEEP IT PLAIN
  -----------------
  Per the original spec's tech stack choice: plain HTML + JS, no build
  step, no framework. A single <script> tag in this file is fine -- this
  is a diagnostic tool for you, not a customer-facing product UI.
-->
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>packet_broker_autotest</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; background: #0f1115; color: #e6e6e6; }
    header { display: flex; align-items: center; gap: 16px; padding: 12px 20px; background: #161922; border-bottom: 1px solid #2a2e3a; position: sticky; top: 0; }
    header h1 { font-size: 16px; margin: 0; }
    #summary { color: #9aa0ab; font-size: 13px; }
    #ws-indicator { font-size: 12px; padding: 2px 8px; border-radius: 10px; background: #2a2e3a; color: #9aa0ab; }
    #ws-indicator.open { background: #16331f; color: #22c55e; }
    #ws-indicator.closed, #ws-indicator.error { background: #3a1414; color: #ef4444; }
    .actions { margin-left: auto; display: flex; gap: 8px; }
    button { background: #2563eb; color: white; border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 13px; }
    button#stop-all { background: #b91c1c; }
    button:hover { opacity: 0.85; }
    main { padding: 20px; }
    .pair-section { margin-bottom: 24px; }
    .pair-section h2 { font-size: 14px; color: #9aa0ab; font-weight: 600; margin: 0 0 8px; }
    table { width: 100%; border-collapse: collapse; background: #161922; border-radius: 6px; overflow: hidden; }
    th, td { text-align: left; padding: 8px 12px; font-size: 13px; border-bottom: 1px solid #2a2e3a; }
    th { color: #9aa0ab; font-weight: 600; }
    tr.test-row { cursor: pointer; }
    tr.test-row:hover { background: #1c2030; }
    .status { font-weight: 700; }
    .status-OK { color: #22c55e; }
    .status-FAIL { color: #ef4444; }
    .status-TIMEOUT { color: #f59e0b; }
    .status-STOPPED { color: #6b7280; }
    .status-PENDING { color: #6b7280; }
  </style>
</head>
<body>
  <header>
    <h1>packet_broker_autotest</h1>
    <span id="summary">loading...</span>
    <span id="ws-indicator">connecting...</span>
    <div class="actions">
      <button id="start-all">Start All</button>
      <button id="stop-all">Stop All</button>
    </div>
  </header>
  <main id="pairs"></main>

  <script>
    const STATUS_GLYPH = { OK: "✓", FAIL: "✗", TIMEOUT: "⏱", STOPPED: "⏸", PENDING: "…" };

    // test_id -> { tr, data }
    const rows = new Map();
    let initialLoaded = false;
    const pendingEvents = [];

    function statusCell(status) {
      const glyph = STATUS_GLYPH[status] || "?";
      return `<span class="status status-${status}">${glyph} ${status}</span>`;
    }

    function renderRow(tr, t) {
      const pps = typeof t.pps === "number" ? t.pps.toFixed(2) : (t.pps ?? "-");
      const loss = typeof t.loss_pct === "number" ? t.loss_pct.toFixed(2) : (t.loss_pct ?? "-");
      tr.innerHTML = `
        <td>${t.id}</td>
        <td>${statusCell(t.status || "PENDING")}</td>
        <td>${pps}</td>
        <td>${loss}%</td>
        <td>${t.running ? "running" : "stopped"}</td>
      `;
    }

    function pairKey(pair) {
      return `${pair.internal} -> ${pair.external}`;
    }

    function ensureSection(pair) {
      const key = pairKey(pair);
      const sectionId = "pair-" + key.replace(/[^a-zA-Z0-9_-]/g, "_");
      let section = document.getElementById(sectionId);
      if (section) return section;

      section = document.createElement("div");
      section.className = "pair-section";
      section.id = sectionId;
      section.innerHTML = `
        <h2>${key}</h2>
        <table>
          <thead><tr><th>Test</th><th>Status</th><th>pps</th><th>loss</th><th>state</th></tr></thead>
          <tbody></tbody>
        </table>
      `;
      document.getElementById("pairs").appendChild(section);
      return section;
    }

    function upsertTestRow(t) {
      let entry = rows.get(t.id);
      if (!entry) {
        const section = ensureSection(t.pair || { internal: "?", external: "?" });
        const tbody = section.querySelector("tbody");
        const tr = document.createElement("tr");
        tr.className = "test-row";
        tr.addEventListener("click", () => {
          window.location.href = `test_detail.html?id=${encodeURIComponent(t.id)}`;
        });
        tbody.appendChild(tr);
        entry = { tr, data: {} };
        rows.set(t.id, entry);
      }
      entry.data = Object.assign({}, entry.data, t);
      renderRow(entry.tr, entry.data);
      updateSummary();
    }

    function updateSummary() {
      const total = rows.size;
      const running = [...rows.values()].filter(e => e.data.running).length;
      document.getElementById("summary").textContent = `${running} / ${total} running`;
    }

    function applyEvent(event) {
      const entry = rows.get(event.test_id);
      if (!entry) {
        // Event for a test we haven't rendered a row for yet (e.g. arrived
        // before the initial GET /api/tests resolved) -- replay once it does.
        pendingEvents.push(event);
        return;
      }
      upsertTestRow({
        id: event.test_id,
        pair: entry.data.pair,
        running: true,
        status: event.status,
        pps: event.pps,
        loss_pct: event.loss_pct,
      });
    }

    function loadInitialTests() {
      return fetch("/api/tests")
        .then(r => r.json())
        .then(list => {
          list.forEach(upsertTestRow);
          initialLoaded = true;
          pendingEvents.splice(0).forEach(applyEvent);
        })
        .catch(err => {
          document.getElementById("summary").textContent = "error loading /api/tests: " + err;
        });
    }

    function connectWebSocket() {
      const ws = new WebSocket("ws://" + location.host + "/ws/live");
      const indicator = document.getElementById("ws-indicator");
      ws.onopen = () => { indicator.textContent = "live"; indicator.className = "open"; };
      ws.onclose = () => { indicator.textContent = "disconnected"; indicator.className = "closed"; };
      ws.onerror = () => { indicator.textContent = "error"; indicator.className = "error"; };
      ws.onmessage = (msg) => applyEvent(JSON.parse(msg.data));
    }

    document.getElementById("start-all").addEventListener("click", () => {
      fetch("/api/tests/start-all", { method: "POST" }).then(loadInitialTests);
    });
    document.getElementById("stop-all").addEventListener("click", () => {
      fetch("/api/tests/stop-all", { method: "POST" }).then(loadInitialTests);
    });

    loadInitialTests();
    connectWebSocket();
  </script>
</body>
</html>
